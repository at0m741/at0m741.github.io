---
layout: default
---
<section class="page-shell">
  {% if page.title %}
    <header class="page-header">
      <p class="eyebrow">{{ page.eyebrow | default: "at0m741.github.io" }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p>{{ page.description }}</p>
      {% endif %}
    </header>
  {% endif %}
  {{ content }}
</section>
