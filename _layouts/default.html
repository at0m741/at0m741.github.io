<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    {% if page.layout == "article" or page.math %}
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" integrity="sha384-5TcZemv2l/9On385z///+d7MSYlvIEw9FuZTIdZ14vJLqWphw7e7ZPuOiCHJcFCP" crossorigin="anonymous">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css">
    {% endif %}
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    {% include nav.html %}
    <main id="main" class="site-main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div>
        <strong>Louis Touzalin / at0m741</strong>
        <span>Low-level systems, compilers, and computational physics.</span>
      </div>
      <a href="{{ '/links/' | relative_url }}">Contact and links</a>
    </footer>
    {% if page.layout == "article" or page.math %}
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" integrity="sha384-cMkvdD8LoxVzGF/RPUKAcvmm49FQ0oxwDF3BGKtDXcEc+T1b2N+teh/OJfpU0jr6" crossorigin="anonymous"></script>
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js" integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXi8YVw9Vg4pHiN" crossorigin="anonymous"></script>
      <script defer src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/common.min.js"></script>
      <script defer src="{{ '/assets/js/article.js' | relative_url }}"></script>
    {% endif %}
  </body>
</html>
